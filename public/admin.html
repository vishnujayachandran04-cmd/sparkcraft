<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparkCraft Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --brand:#2563EB;--brand-dark:#1D4ED8;--brand-light:#EFF6FF;
    --navy:#1A2332;--slate:#3D4E63;--muted:#6B7B8E;
    --border:#E2E8F0;--bg:#F1F5F9;--white:#FFFFFF;
    --green:#10B981;--red:#EF4444;--amber:#F59E0B;
  }
  body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--navy);font-size:14px;min-height:100vh;}
  a{text-decoration:none;color:inherit;}

  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);}
  .login-box{background:var(--white);border-radius:16px;padding:3rem;width:380px;text-align:center;}
  .login-logo{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;margin-bottom:.5rem;}
  .login-logo span{color:var(--brand);}
  .login-sub{color:var(--muted);font-size:14px;margin-bottom:2rem;}
  .login-box input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;font-family:'Lato',sans-serif;margin-bottom:1rem;outline:none;transition:border-color .2s;}
  .login-box input:focus{border-color:var(--brand);}
  .login-btn{width:100%;background:var(--brand);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
  .login-btn:hover{background:var(--brand-dark);}
  .login-error{color:var(--red);font-size:13px;margin-top:.75rem;display:none;}

  #app{display:none;}

  .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--navy);color:#fff;padding:1.5rem;display:flex;flex-direction:column;}
  .sidebar-logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;margin-bottom:2rem;}
  .sidebar-logo span{color:var(--brand);}
  .sidebar-nav{flex:1;display:flex;flex-direction:column;gap:4px;}
  .sidebar-nav button{background:none;border:none;color:rgba(255,255,255,.6);text-align:left;padding:10px 12px;border-radius:8px;font-size:14px;font-family:'Lato',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;font-weight:700;}
  .sidebar-nav button:hover{background:rgba(255,255,255,.08);color:#fff;}
  .sidebar-nav button.active{background:var(--brand);color:#fff;}
  .sidebar-footer{font-size:12px;color:rgba(255,255,255,.3);}
  .sidebar-footer button{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:12px;padding:4px 0;transition:color .2s;}
  .sidebar-footer button:hover{color:#fff;}

  .main{margin-left:220px;padding:2rem;}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
  .stat-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:1.25rem 1.5rem;}
  .stat-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:.5rem;}
  .stat-value{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;line-height:1;}
  .stat-value.blue{color:var(--brand);}
  .stat-value.green{color:var(--green);}
  .stat-value.amber{color:var(--amber);}

  .toolbar{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
  .toolbar-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;flex:1;}
  .refresh-btn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:background .2s;}
  .refresh-btn:hover{background:var(--brand-dark);}

  .table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--bg);text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--bg);}
  td{padding:12px 16px;vertical-align:middle;}

  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .badge-new{background:#DBEAFE;color:#1E40AF;}
  .badge-reviewed{background:#FEF3C7;color:#92400E;}
  .badge-contacted{background:#D1FAE5;color:#065F46;}
  .badge-completed{background:#E0E7FF;color:#3730A3;}

  .name-cell{font-weight:700;font-size:14px;}
  .sub-cell{font-size:12px;color:var(--muted);margin-top:2px;}

  .action-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--slate);transition:all .15s;margin-right:4px;}
  .action-btn:hover{border-color:var(--brand);color:var(--brand);}
  .action-btn.danger:hover{border-color:var(--red);color:var(--red);}

  select.status-select{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-family:'Lato',sans-serif;background:var(--white);cursor:pointer;outline:none;}

  /* Gallery */
  #gallery-section{display:none;}
  .upload-area{background:var(--white);border:2px dashed var(--border);border-radius:14px;padding:3rem;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:1.5rem;}
  .upload-area:hover,.upload-area.dragover{border-color:var(--brand);background:var(--brand-light);}
  .upload-icon{font-size:40px;margin-bottom:1rem;opacity:.4;}
  .upload-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-bottom:.5rem;}
  .upload-sub{font-size:13px;color:var(--muted);}
  #file-input{display:none;}
  .caption-row{display:flex;gap:1rem;margin-bottom:1.5rem;align-items:center;}
  .caption-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Lato',sans-serif;outline:none;transition:border-color .2s;}
  .caption-row input:focus{border-color:var(--brand);}
  .upload-btn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:background .2s;white-space:nowrap;}
  .upload-btn:hover{background:var(--brand-dark);}
  .upload-btn:disabled{opacity:.5;cursor:not-allowed;}
  .preview-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.5rem;display:none;text-align:center;}
  .preview-box img{max-height:200px;border-radius:8px;margin-bottom:.5rem;}
  .preview-name{font-size:12px;color:var(--muted);}

  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;}
  .gallery-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;}
  .gallery-card img{width:100%;height:140px;object-fit:cover;display:block;}
  .gallery-card-footer{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .gallery-caption{font-size:12px;color:var(--slate);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;transition:color .15s;flex-shrink:0;}
  .del-btn:hover{color:var(--red);}
  .gallery-empty{text-align:center;padding:3rem;color:var(--muted);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--white);border-radius:16px;padding:2rem;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
  .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;}
  .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
  .modal-row{display:grid;grid-template-columns:120px 1fr;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .modal-row:last-child{border-bottom:none;}
  .modal-key{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding-top:2px;}
  .modal-val{color:var(--navy);line-height:1.6;}

  .empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
  .loading{text-align:center;padding:3rem;color:var(--muted);}

  #toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;z-index:300;transform:translateY(80px);transition:transform .3s ease;pointer-events:none;}
  #toast.show{transform:translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Spark<span>Craft</span></div>
    <div class="login-sub">Admin Dashboard</div>
    <input type="password" id="pwd-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Spark<span>Craft</span></div>
    <nav class="sidebar-nav">
      <button class="active" onclick="setView('all')">📋 All Quotes</button>
      <button onclick="setView('new')">🔵 New</button>
      <button onclick="setView('reviewed')">🟡 Reviewed</button>
      <button onclick="setView('contacted')">🟢 Contacted</button>
      <button onclick="setView('completed')">🟣 Completed</button>
      <button onclick="setView('gallery')">🖼️ Gallery</button>
    </nav>
    <div class="sidebar-footer"><button onclick="doLogout()">Sign out</button></div>
  </aside>

  <main class="main">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value blue" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">New</div><div class="stat-value blue" id="s-new">—</div></div>
      <div class="stat-card"><div class="stat-label">Contacted</div><div class="stat-value green" id="s-contacted">—</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value amber" id="s-completed">—</div></div>
    </div>

    <!-- Quotes section -->
    <div id="quotes-section">
      <div class="toolbar">
        <div class="toolbar-title" id="view-title">All Quotes</div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
      <div class="table-wrap">
        <div id="table-container" class="loading">Loading…</div>
      </div>
    </div>

    <!-- Gallery section -->
    <div id="gallery-section">
      <div class="toolbar">
        <div class="toolbar-title">Gallery Manager</div>
        <button class="refresh-btn" onclick="loadGallery()">↻ Refresh</button>
      </div>

      <!-- Upload area -->
      <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
        <div class="upload-icon">📷</div>
        <div class="upload-title">Click to upload or drag & drop</div>
        <div class="upload-sub">JPG, PNG, WEBP — Max 6MB per image</div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="fileSelected(event)">

      <!-- Preview + caption -->
      <div class="preview-box" id="preview-box">
        <img id="preview-img" src="" alt="preview">
        <div class="preview-name" id="preview-name"></div>
      </div>

      <div class="caption-row">
        <input type="text" id="caption-input" placeholder="Caption (optional) e.g. Custom gate project">
        <button class="upload-btn" id="upload-btn" onclick="uploadImage()" disabled>Upload Image</button>
      </div>

      <!-- Gallery grid -->
      <div id="gallery-grid-container" class="loading">Loading…</div>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-name">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://sparkcraft-production.up.railway.app';
let adminPwd = '';
let currentView = 'all';
let quotes = [];
let selectedFile = null;
let selectedDataUrl = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (!pwd) return;
  const res = await fetch(`${API}/api/admin/stats`, { headers:{'x-admin-password':pwd} });
  if (res.ok) {
    adminPwd = pwd;
    sessionStorage.setItem('sc_admin', pwd);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function doLogout() { sessionStorage.removeItem('sc_admin'); location.reload(); }

window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('sc_admin');
  if (saved) {
    adminPwd = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  }
});

// ── View switching ────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  const isGallery = v === 'gallery';
  document.getElementById('quotes-section').style.display = isGallery ? 'none' : 'block';
  document.getElementById('gallery-section').style.display = isGallery ? 'block' : 'none';
  document.getElementById('stats-grid').style.display = isGallery ? 'none' : 'grid';

  const titles = {all:'All Quotes',new:'New Requests',reviewed:'Reviewed',contacted:'Contacted',completed:'Completed'};
  if (!isGallery) document.getElementById('view-title').textContent = titles[v];

  document.querySelectorAll('.sidebar-nav button').forEach((btn,i) => {
    btn.classList.toggle('active', ['all','new','reviewed','contacted','completed','gallery'][i] === v);
  });

  if (isGallery) loadGallery(); else loadQuotes();
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadData() { loadStats(); loadQuotes(); }

async function loadStats() {
  try {
    const res = await fetch(`${API}/api/admin/stats`, {headers:{'x-admin-password':adminPwd}});
    const d = await res.json();
    document.getElementById('s-total').textContent     = d.total       || 0;
    document.getElementById('s-new').textContent       = d.new_count   || 0;
    document.getElementById('s-contacted').textContent = d.contacted_count || 0;
    document.getElementById('s-completed').textContent = d.completed_count || 0;
  } catch(e) {}
}

async function loadQuotes() {
  const container = document.getElementById('table-container');
  container.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const url = currentView==='all' ? `${API}/api/admin/quotes` : `${API}/api/admin/quotes?status=${currentView}`;
    const res = await fetch(url, {headers:{'x-admin-password':adminPwd}});
    quotes = await res.json();
    renderTable(quotes);
  } catch(e) {
    container.innerHTML = '<div class="empty">⚠️ Could not connect to server.</div>';
  }
}

// ── Quotes table ──────────────────────────────────────────────────────────────
function renderTable(rows) {
  const container = document.getElementById('table-container');
  if (!rows.length) { container.innerHTML = '<div class="empty">📭 No quote requests found.</div>'; return; }
  container.innerHTML = `<table><thead><tr><th>#</th><th>Client</th><th>Service</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="tbody"></tbody></table>`;
  const tbody = document.getElementById('tbody');
  rows.forEach(q => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:12px;">#${q.id}</td>
      <td><div class="name-cell">${esc(q.first_name)} ${esc(q.last_name)}</div><div class="sub-cell">${esc(q.email)}${q.phone?' · '+esc(q.phone):''}</div></td>
      <td>${esc(q.service)}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap;">${formatDate(q.created_at)}</td>
      <td><select class="status-select" onchange="changeStatus(${q.id},this.value)">${['new','reviewed','contacted','completed'].map(s=>`<option value="${s}"${q.status===s?' selected':''}>${cap(s)}</option>`).join('')}</select></td>
      <td><button class="action-btn" onclick="viewDetail(${q.id})">View</button><button class="action-btn danger" onclick="deleteQuote(${q.id})">Delete</button></td>`;
    tbody.appendChild(tr);
  });
}

async function changeStatus(id, status) {
  await fetch(`${API}/api/admin/quotes/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json','x-admin-password':adminPwd}, body:JSON.stringify({status}) });
  showToast(`Status → ${cap(status)}`); loadStats();
}

async function deleteQuote(id) {
  if (!confirm('Delete this quote?')) return;
  await fetch(`${API}/api/admin/quotes/${id}`, { method:'DELETE', headers:{'x-admin-password':adminPwd} });
  showToast('Quote deleted'); loadData();
}

function viewDetail(id) {
  const q = quotes.find(x=>x.id===id); if (!q) return;
  document.getElementById('modal-name').textContent = `${q.first_name} ${q.last_name}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-row"><div class="modal-key">Email</div><div class="modal-val"><a href="mailto:${esc(q.email)}" style="color:var(--brand)">${esc(q.email)}</a></div></div>
    <div class="modal-row"><div class="modal-key">Phone</div><div class="modal-val">${q.phone?esc(q.phone):'—'}</div></div>
    <div class="modal-row"><div class="modal-key">Service</div><div class="modal-val">${esc(q.service)}</div></div>
    <div class="modal-row"><div class="modal-key">Message</div><div class="modal-val">${q.message?esc(q.message):'—'}</div></div>
    <div class="modal-row"><div class="modal-key">Status</div><div class="modal-val"><span class="badge badge-${q.status}">${cap(q.status)}</span></div></div>
    <div class="modal-row"><div class="modal-key">Received</div><div class="modal-val">${formatDate(q.created_at,true)}</div></div>`;
  document.getElementById('detail-modal').classList.add('open');
}
function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }
document.getElementById('detail-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── Gallery ───────────────────────────────────────────────────────────────────
async function loadGallery() {
  const container = document.getElementById('gallery-grid-container');
  container.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const res = await fetch(`${API}/api/admin/gallery`, {headers:{'x-admin-password':adminPwd}});
    const images = await res.json();
    renderGallery(images);
  } catch(e) {
    container.innerHTML = '<div class="gallery-empty">⚠️ Could not load gallery.</div>';
  }
}

function renderGallery(images) {
  const container = document.getElementById('gallery-grid-container');
  if (!images.length) {
    container.innerHTML = '<div class="gallery-empty">📷 No images yet. Upload your first project photo above!</div>';
    return;
  }
  container.innerHTML = '<div class="gallery-grid" id="gallery-grid"></div>';
  const grid = document.getElementById('gallery-grid');
  images.forEach(img => {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.innerHTML = `
      <img src="${img.data}" alt="${esc(img.caption||'Project photo')}">
      <div class="gallery-card-footer">
        <span class="gallery-caption">${esc(img.caption||'No caption')}</span>
        <button class="del-btn" onclick="deleteImage(${img.id})" title="Delete">✕</button>
      </div>`;
    grid.appendChild(card);
  });
}

function fileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  processFile(file);
}

function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); }
function dragLeave(e) { document.getElementById('drop-zone').classList.remove('dragover'); }
function dropFile(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) processFile(file);
}

function processFile(file) {
  if (file.size > 6 * 1024 * 1024) { showToast('Image too large! Max 6MB.'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    selectedDataUrl = e.target.result;
    document.getElementById('preview-img').src = selectedDataUrl;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('preview-box').style.display = 'block';
    document.getElementById('upload-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function uploadImage() {
  if (!selectedDataUrl) return;
  const btn = document.getElementById('upload-btn');
  const caption = document.getElementById('caption-input').value.trim();
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  try {
    const res = await fetch(`${API}/api/admin/gallery`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-admin-password':adminPwd},
      body: JSON.stringify({ data: selectedDataUrl, caption })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('Image uploaded! ✅');
      selectedFile = null;
      selectedDataUrl = null;
      document.getElementById('preview-box').style.display = 'none';
      document.getElementById('caption-input').value = '';
      document.getElementById('file-input').value = '';
      loadGallery();
    } else {
      showToast(data.error || 'Upload failed');
    }
  } catch(e) { showToast('Upload failed'); }
  btn.disabled = false;
  btn.textContent = 'Upload Image';
}

async function deleteImage(id) {
  if (!confirm('Delete this image from gallery?')) return;
  await fetch(`${API}/api/admin/gallery/${id}`, { method:'DELETE', headers:{'x-admin-password':adminPwd} });
  showToast('Image deleted'); loadGallery();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function formatDate(str,long){
  const d=new Date(str+(str.endsWith('Z')?'':'Z'));
  return long ? d.toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'}) : d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
